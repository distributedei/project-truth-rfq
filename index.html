<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFQ Builder — Project Truth</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23E8A838'/><text x='16' y='22' text-anchor='middle' fill='%230B0F14' font-family='system-ui' font-weight='bold' font-size='16'>RQ</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #0B0F14; color: #E8ECF1; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #243044; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2D3D55; }
    input, textarea, select { outline: none; }
    input:focus, textarea:focus, select:focus { border-color: #E8A838 !important; }
    @media print {
      body { background: #fff !important; }
      aside, header, .no-print { display: none !important; }
      main { padding: 0 !important; overflow: visible !important; }
      main > div { padding: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(RFQBuilder));
  </script>
</body>
